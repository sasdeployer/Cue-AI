services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cueai-db
    environment:
      POSTGRES_USER: cueai
      POSTGRES_PASSWORD: cueai
      POSTGRES_DB: cueai
    ports:
      - "5432:5432"
    volumes:
      - cueai-pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cueai -d cueai"]
      interval: 3s
      timeout: 3s
      retries: 20

volumes:
  cueai-pgdata:
